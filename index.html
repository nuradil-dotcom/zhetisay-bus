<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zholda" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="description" content="Автобустарды тікелей эфирде бақылау және ресми кестелер." />
    <meta property="og:title" content="Zholda — Жетісай автобустары" />
    <meta property="og:description" content="Автобустарды тікелей эфирде бақылау және ресми кестелер." />
    <meta property="og:image" content="/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Latin Revalia for “Zholda” — preload so swap happens fast; display=swap = text paints immediately -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/revalia/v24/WwkexPimBE2-4ZPESV3kNaoKWNI.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Non-blocking font load: fetch speculatively, swap to stylesheet once ready.
         media="print" causes immediate async fetch; onload switches to screen. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Revalia&family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Revalia&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Zholda</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
